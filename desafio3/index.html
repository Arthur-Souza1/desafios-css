<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio 3 — Formulário Responsivo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <form class="formulario">

      <div class="linha">
        <div class="campo">
          <label for="nome">NOME</label>
          <input type="text" id="nome" placeholder="Digite aqui" />
        </div>
        <div class="campo">
          <label for="email">E-MAIL</label>
          <input type="email" id="email" placeholder="Digite aqui" />
        </div>
      </div>

      <div class="linha">
        <div class="campo">
          <label for="telefone">TELEFONE</label>
          <input type="tel" id="telefone" placeholder="Digite aqui" />
        </div>
        <div class="campo hide-mobile">
          <label for="assunto">ASSUNTO</label>
          <input type="text" id="assunto" placeholder="Digite aqui" />
        </div>
        <div class="campo hide-mobile">
          <label for="curso">CURSO</label>
          <input type="text" id="curso" placeholder="Digite aqui" />
        </div>

      </div>

    </form>

  </main>

</body>
</html>
